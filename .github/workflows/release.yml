name: Build and Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: MineAdmin-linux
            asset_name: MineAdmin-linux
          - os: windows-latest
            artifact_name: MineAdmin-windows
            asset_name: MineAdmin-windows.exe
          - os: macos-latest
            artifact_name: MineAdmin-macos
            asset_name: MineAdmin-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        shell: bash
        run: echo "VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --onefile \
            --name ${{ matrix.artifact_name }} \
            --add-data "app/static:app/static" \
            --add-data "app/templates:app/templates" \
            --add-data "VERSION:." \
            --hidden-import aiosqlite \
            --hidden-import aiofiles \
            --hidden-import aiofiles.os \
            --hidden-import aiofiles.threadpool \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import multipart \
            --collect-all aiosqlite \
            --collect-all aiofiles \
            main.py

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onefile `
            --name ${{ matrix.artifact_name }} `
            --add-data "app/static;app/static" `
            --add-data "app/templates;app/templates" `
            --add-data "VERSION;." `
            --hidden-import aiosqlite `
            --hidden-import aiofiles `
            --hidden-import aiofiles.os `
            --hidden-import aiofiles.threadpool `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import multipart `
            --collect-all aiosqlite `
            --collect-all aiofiles `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.VERSION }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.VERSION }}" \
            --title "MineAdmin v${{ steps.version.outputs.VERSION }}" \
            --notes "Release v${{ steps.version.outputs.VERSION }}" \
            dist/MineAdmin-linux/MineAdmin-linux \
            dist/MineAdmin-windows/MineAdmin-windows.exe \
            dist/MineAdmin-macos/MineAdmin-macos
